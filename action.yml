name: "EvoOM Guard"
# Marketplace requires < 125 characters; the full story lives in the README.
description: >-
  Catches AI agents gaming your tests: runs the repo's suite and REJECTS any
  edit to the test harness. Judge-owned verdict.
branding:
  icon: "shield"
  color: "red"

inputs:
  base-ref:
    description: "Git ref to diff against (default: the PR base SHA, else HEAD^)."
    required: false
    default: ""
  test-command:
    description: "Test command run inside the repo copy (default: pytest -q)."
    required: false
    default: ""
  protected:
    description: "Extra space-separated globs the patch may not modify."
    required: false
    default: ""
  comment:
    description: "Post the report as a PR comment (needs pull-requests: write)."
    required: false
    default: "true"
  fail-on:
    description: "Verdicts that fail the step: 'any-non-pass' (default) or 'rejected-only'."
    required: false
    default: "any-non-pass"
  isolation:
    description: "Isolation: 'subprocess' (default), 'docker', or 'gvisor' (the latter two need docker-image + a docker daemon; 'gvisor' also needs the runsc runtime)."
    required: false
    default: ""
  docker-image:
    description: "Container image for isolation 'docker'/'gvisor' (must carry the test runner, e.g. node:22-slim)."
    required: false
    default: ""
  docker-network:
    description: "Container network for isolation 'docker'/'gvisor' (default: 'none' — no network, the safe choice; pass a docker network name only if the suite genuinely needs it)."
    required: false
    default: ""
  sarif:
    description: "If set, write a SARIF 2.1.0 report to this workspace path (upload it with github/codeql-action/upload-sarif)."
    required: false
    default: ""
  allow:
    description: "Baseline allowlist: space-separated globs exempt from the test/config/CI rejection (never auto-exec/unsafe paths)."
    required: false
    default: ""
  allow-new-tests:
    description: "Feature mode: 'true' allows brand-new test files (edits to existing tests/config/auto-exec stay rejected)."
    required: false
    default: "false"
  timeout:
    description: "Per-run suite timeout in seconds."
    required: false
    default: ""
  mem-limit:
    description: "Address-space cap (MB) for the test subprocess; 0 disables it (needed for Node/V8 suites)."
    required: false
    default: ""
  verifier-pack:
    description: "Path to a directory of judge-owned tests/invariants the patch cannot modify (org-owned checks injected at judgment time). Mounted read-only into the verified copy and collected with the suite (pytest runners). NOT hidden from the running code — see docs/VERIFIER_PACKS.md."
    required: false
    default: ""
  blackbox:
    description: "'true' runs the external black-box judge (needs verifier-pack): the verdict comes from the judge's own pytest over the pack, which never imports the candidate — closing same-process report forgery. See docs/BLACKBOX.md."
    required: false
    default: "false"
  require-report-integrity:
    description: "Fail-closed policy: require at least this report_integrity level ('same_process_candidate_writable' or 'external_process_isolated') or the step ERRORs (assurance_requirement_not_met). 'external_process_isolated' needs blackbox."
    required: false
    default: ""
  require-candidate-isolation:
    description: "Fail-closed policy: require at least this candidate isolation ('subprocess'|'docker'|'gvisor') or the step ERRORs."
    required: false
    default: ""
  diff-coverage:
    description: "'true' measures which changed lines the suite actually executed (one extra suite run; installs the 'cov' extra). Evidence only unless min-diff-coverage is set."
    required: false
    default: "false"
  min-diff-coverage:
    description: "Gate: a PASS whose measured changed-line coverage is below this percentage becomes FAIL (diff_coverage_below_threshold). Implies diff-coverage."
    required: false
    default: ""

outputs:
  verdict:
    description: "PASS | REJECTED | FAIL | TAMPERED | ERROR"
    value: ${{ steps.guard.outputs.verdict }}

runs:
  using: "composite"
  steps:
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - name: Install EvoGuard
      shell: bash
      run: |
        # Install the 'cov' extra only when changed-line coverage is requested,
        # so the default install stays dependency-free.
        if [ "${{ inputs.diff-coverage }}" = "true" ] || [ -n "${{ inputs.min-diff-coverage }}" ]; then
          pip install -q "${{ github.action_path }}[cov]"
        else
          pip install -q "${{ github.action_path }}"
        fi

    - name: Run EvoGuard
      id: guard
      shell: bash
      working-directory: ${{ github.workspace }}
      run: |
        set -e
        # Resolve the base to diff against: explicit input, else the PR base, else HEAD^.
        BASE="${{ inputs.base-ref }}"
        if [ -z "$BASE" ]; then BASE="${{ github.event.pull_request.base.sha }}"; fi
        if [ -z "$BASE" ]; then BASE="$(git rev-parse HEAD^ 2>/dev/null || git rev-parse HEAD)"; fi
        echo "Diffing against base: $BASE"
        git fetch --no-tags --depth=1 origin "$BASE" 2>/dev/null || true
        # The recommended path: pipe the diff; EvoGuard reverse-applies it to the head
        # checkout (this working dir) — no second checkout or worktree.
        ARGS=(guard --diff - --report "$RUNNER_TEMP/guard-report.md" --json "$RUNNER_TEMP/guard.json")
        if [ -n "${{ inputs.test-command }}" ]; then ARGS+=(--test-command "${{ inputs.test-command }}"); fi
        if [ -n "${{ inputs.protected }}" ]; then ARGS+=(--protected ${{ inputs.protected }}); fi
        if [ -n "${{ inputs.allow }}" ]; then ARGS+=(--allow ${{ inputs.allow }}); fi
        if [ "${{ inputs.allow-new-tests }}" = "true" ]; then ARGS+=(--allow-new-tests); fi
        if [ -n "${{ inputs.isolation }}" ]; then ARGS+=(--isolation "${{ inputs.isolation }}"); fi
        if [ -n "${{ inputs.docker-image }}" ]; then ARGS+=(--docker-image "${{ inputs.docker-image }}"); fi
        if [ -n "${{ inputs.docker-network }}" ]; then ARGS+=(--docker-network "${{ inputs.docker-network }}"); fi
        if [ -n "${{ inputs.timeout }}" ]; then ARGS+=(--timeout "${{ inputs.timeout }}"); fi
        if [ -n "${{ inputs.mem-limit }}" ]; then ARGS+=(--mem-limit "${{ inputs.mem-limit }}"); fi
        if [ -n "${{ inputs.sarif }}" ]; then ARGS+=(--sarif "${{ inputs.sarif }}"); fi
        if [ -n "${{ inputs.verifier-pack }}" ]; then ARGS+=(--verifier-pack "${{ inputs.verifier-pack }}"); fi
        if [ "${{ inputs.blackbox }}" = "true" ]; then ARGS+=(--blackbox); fi
        if [ -n "${{ inputs.require-report-integrity }}" ]; then ARGS+=(--require-report-integrity "${{ inputs.require-report-integrity }}"); fi
        if [ -n "${{ inputs.require-candidate-isolation }}" ]; then ARGS+=(--require-candidate-isolation "${{ inputs.require-candidate-isolation }}"); fi
        if [ "${{ inputs.diff-coverage }}" = "true" ]; then ARGS+=(--diff-coverage); fi
        if [ -n "${{ inputs.min-diff-coverage }}" ]; then ARGS+=(--min-diff-coverage "${{ inputs.min-diff-coverage }}"); fi
        set +e
        git diff "$BASE...HEAD" | evo-guard "${ARGS[@]}"
        GUARD_CODE=$?
        set -e
        VERDICT=$(python -c "import json;print(json.load(open('$RUNNER_TEMP/guard.json'))['verdict'])")
        echo "verdict=$VERDICT" >> "$GITHUB_OUTPUT"
        cat "$RUNNER_TEMP/guard-report.md" >> "$GITHUB_STEP_SUMMARY"
        if [ "${{ inputs.fail-on }}" = "rejected-only" ]; then
          [ "$VERDICT" = "REJECTED" ] && exit 1 || exit 0
        fi
        exit $GUARD_CODE

    - name: Comment on the PR
      if: ${{ always() && inputs.comment == 'true' && github.event_name == 'pull_request' }}
      uses: actions/github-script@v7
      with:
        script: |
          const fs = require('fs');
          const p = process.env.RUNNER_TEMP + '/guard-report.md';
          if (!fs.existsSync(p)) return;
          // Stable hidden marker so re-runs UPDATE one sticky comment instead of
          // appending a new one each push (see issue #16). Kept invisible (HTML
          // comment) and unchanged across runs; the report content is unchanged.
          const MARKER = '<!-- evoguard-report -->';
          const body = MARKER + '\n' + fs.readFileSync(p, 'utf8');
          const { owner, repo } = context.repo;
          const issue_number = context.issue.number;
          // Find a prior EvoGuard comment by our marker; update it if present,
          // otherwise create a fresh one.
          const comments = await github.paginate(github.rest.issues.listComments, {
            owner, repo, issue_number, per_page: 100,
          });
          const existing = comments.find((c) => c.body && c.body.includes(MARKER));
          if (existing) {
            await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body });
          } else {
            await github.rest.issues.createComment({ owner, repo, issue_number, body });
          }
