name: "EvoOM Guard"
# Marketplace requires < 125 characters; the full story lives in the README.
description: >-
  Evidence-bound change verification: rejects test-harness edits;
  judge-owned verdicts and optional black-box checks.
branding:
  icon: "shield"
  color: "red"

inputs:
  base-ref:
    description: "Git ref to diff against (default: the PR base SHA, else HEAD^)."
    required: false
    default: ""
  test-command:
    description: "Test command run inside the repo copy (default: pytest -q)."
    required: false
    default: ""
  protected:
    description: "Extra space-separated globs the patch may not modify."
    required: false
    default: ""
  comment:
    description: "Post the report as a PR comment (needs pull-requests: write)."
    required: false
    default: "true"
  fail-on:
    description: "Verdicts that fail the step: 'any-non-pass' (default) or 'rejected-only'. WARNING — 'rejected-only' gates ONLY harness integrity: FAIL, TAMPERED and ERROR verdicts leave the step GREEN. It is not a correctness gate; keep the default unless you consciously want that."
    required: false
    default: "any-non-pass"
  isolation:
    description: "Isolation: 'subprocess' (default), 'docker', or 'gvisor' (the latter two need docker-image + a docker daemon; 'gvisor' also needs the runsc runtime)."
    required: false
    default: ""
  docker-image:
    description: "Container image for isolation 'docker'/'gvisor' (must carry the test runner, e.g. node:22-slim)."
    required: false
    default: ""
  docker-network:
    description: "Container network for isolation 'docker'/'gvisor' (default: 'none' — no network, the safe choice; pass a docker network name only if the suite genuinely needs it)."
    required: false
    default: ""
  sarif:
    description: "If set, write a SARIF 2.1.0 report to this workspace path (upload it with github/codeql-action/upload-sarif)."
    required: false
    default: ""
  allow:
    description: "Baseline allowlist: space-separated globs exempt from the test/config/CI rejection (never auto-exec/unsafe paths)."
    required: false
    default: ""
  allow-new-tests:
    description: "Feature mode: 'true' allows brand-new test files (edits to existing tests/config/auto-exec stay rejected)."
    required: false
    default: "false"
  timeout:
    description: "Per-run suite timeout in seconds."
    required: false
    default: ""
  mem-limit:
    description: "Address-space cap (MB) for the test subprocess; 0 disables it (needed for Node/V8 suites)."
    required: false
    default: ""
  verifier-pack:
    description: "Path to judge-owned pytest invariants. Repo-native mode runs a verified snapshot after the repo suite; blackbox runs the external pack first and may short-circuit before the repo phase. Repo-native imports are not a secrecy boundary; use blackbox with Docker for runtime separation."
    required: false
    default: ""
  expect-verifier-pack-sha256:
    description: "Fail-closed EVOGUARD_PACK_V2 identity pin for verifier-pack (64 hex characters from pack-doctor). The accepted snapshot must match before candidate code runs."
    required: false
    default: ""
  blackbox:
    description: "'true' runs the external black-box judge (needs verifier-pack). The pack must reach the candidate through $EVOGUARD_EXEC; candidate isolation is claimed only after an observed launcher invocation (and container CID). By default the repo's own suite is also required, so overall report integrity is the weaker repo-native channel. See docs/BLACKBOX.md."
    required: false
    default: "false"
  blackbox-only:
    description: "With blackbox, judge ONLY the external pack and skip the repo's own suite (for pure-CLI/service targets with no in-repo tests). Otherwise a failing repo suite blocks the merge even if the pack passes."
    required: false
    default: "false"
  require-report-integrity:
    description: "For completed PASS verdicts, fail closed unless this end-to-end report_integrity level is delivered ('same_process_candidate_writable' or 'external_process_isolated'). Static/preflight/incomplete causes remain unchanged. 'external_process_isolated' requires blackbox-only; default blackbox is composite with the weaker repo-native channel."
    required: false
    default: ""
  require-candidate-isolation:
    description: "For completed PASS verdicts, fail closed unless this candidate isolation is observed ('subprocess'|'docker'|'gvisor'). Preparing a runner is insufficient: blackbox requires an EVOGUARD_EXEC receipt, plus a runtime CID for docker/gvisor. Static/preflight/incomplete causes remain unchanged."
    required: false
    default: ""
  trust-setup-on-host:
    description: "Optional tri-state override: 'true' runs setup_command on the host (weakens effective isolation to subprocess); 'false' forces container setup; blank respects .evoguard.json."
    required: false
    default: ""
  diff-coverage:
    description: "'true' measures which changed lines the suite actually executed (one extra suite run; installs the 'cov' extra). Evidence only unless min-diff-coverage is set."
    required: false
    default: "false"
  min-diff-coverage:
    description: "Gate: a PASS whose measured changed-line coverage is below this percentage becomes FAIL (diff_coverage_below_threshold). Implies diff-coverage."
    required: false
    default: ""
  baseline-evidence:
    description: "'true' adds before/after differential evidence: the suite ALSO runs on the pristine base, and the report shows repair_effect ('demonstrated' only when base FAILs and candidate PASSes under the same judge). One extra suite run; evidence only."
    required: false
    default: "false"
  require-demonstrated-fix:
    description: "Gate (implies baseline-evidence): a PASS whose repair effect is not demonstrated (base already green, or no clean baseline) becomes FAIL (fix_not_demonstrated). For agent 'fix' PRs only — ordinary feature PRs start from a green base and would fail this."
    required: false
    default: "false"

outputs:
  verdict:
    description: "PASS | REJECTED | FAIL | TAMPERED | ERROR"
    value: ${{ steps.guard.outputs.verdict }}
  json-path:
    description: "Path (on the runner) of the machine-readable verdict JSON — carries the full attestation (effective_policy, policy_sha256, base/head commit+tree SHAs). Upload or sign it in a follow-up step."
    value: ${{ steps.guard.outputs.json-path }}
  report-path:
    description: "Path (on the runner) of the Markdown report."
    value: ${{ steps.guard.outputs.report-path }}
  head-sha:
    description: "The head commit SHA the verdict was bound to."
    value: ${{ steps.guard.outputs.head-sha }}
  policy-sha:
    description: "sha256 of the COMPLETE effective policy that shaped the judgment (attestation.policy_sha256) — pass to `evo-guard verify-verdict --expect-policy-sha`."
    value: ${{ steps.guard.outputs.policy-sha }}

runs:
  using: "composite"
  steps:
    - name: Set up Python
      uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
      with:
        python-version: "3.12"

    - name: Install EvoGuard
      shell: bash
      env:
        INPUT_DIFF_COVERAGE: ${{ inputs.diff-coverage }}
        INPUT_MIN_DIFF_COVERAGE: ${{ inputs.min-diff-coverage }}
      run: |
        # Install the 'cov' extra only when changed-line coverage is requested,
        # so the default install stays dependency-free.
        if [ "$INPUT_DIFF_COVERAGE" = "true" ] || [ -n "$INPUT_MIN_DIFF_COVERAGE" ]; then
          pip install -q "${{ github.action_path }}[cov]"
        else
          pip install -q "${{ github.action_path }}"
        fi

    - name: Run EvoGuard
      id: guard
      shell: bash
      working-directory: ${{ github.workspace }}
      env:
        INPUT_BASE_REF: ${{ inputs.base-ref }}
        INPUT_TEST_COMMAND: ${{ inputs.test-command }}
        INPUT_PROTECTED: ${{ inputs.protected }}
        INPUT_ALLOW: ${{ inputs.allow }}
        INPUT_ALLOW_NEW_TESTS: ${{ inputs.allow-new-tests }}
        INPUT_ISOLATION: ${{ inputs.isolation }}
        INPUT_DOCKER_IMAGE: ${{ inputs.docker-image }}
        INPUT_DOCKER_NETWORK: ${{ inputs.docker-network }}
        INPUT_TIMEOUT: ${{ inputs.timeout }}
        INPUT_MEM_LIMIT: ${{ inputs.mem-limit }}
        INPUT_SARIF: ${{ inputs.sarif }}
        INPUT_VERIFIER_PACK: ${{ inputs.verifier-pack }}
        INPUT_EXPECT_VERIFIER_PACK_SHA256: ${{ inputs.expect-verifier-pack-sha256 }}
        INPUT_BLACKBOX: ${{ inputs.blackbox }}
        INPUT_BLACKBOX_ONLY: ${{ inputs.blackbox-only }}
        INPUT_REQUIRE_REPORT_INTEGRITY: ${{ inputs.require-report-integrity }}
        INPUT_REQUIRE_CANDIDATE_ISOLATION: ${{ inputs.require-candidate-isolation }}
        INPUT_TRUST_SETUP_ON_HOST: ${{ inputs.trust-setup-on-host }}
        INPUT_DIFF_COVERAGE: ${{ inputs.diff-coverage }}
        INPUT_MIN_DIFF_COVERAGE: ${{ inputs.min-diff-coverage }}
        INPUT_BASELINE_EVIDENCE: ${{ inputs.baseline-evidence }}
        INPUT_REQUIRE_DEMONSTRATED_FIX: ${{ inputs.require-demonstrated-fix }}
        INPUT_FAIL_ON: ${{ inputs.fail-on }}
        PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
      run: |
        set -e
        # A diagnosable, fail-fast exit for setup problems (missing base, shallow
        # history): name the cause, write it to the step summary, and stop BEFORE
        # the guard runs — never let a broken diff surface as a confusing
        # "empty diff" verdict downstream.
        fail_setup() {
          echo "::error::EvoGuard: $1 — $2"
          { echo "## EvoGuard — ⚠️ ERROR (${1})"; echo; echo "**$2**"; } >> "$GITHUB_STEP_SUMMARY"
          echo "verdict=ERROR" >> "$GITHUB_OUTPUT"
          exit 1
        }
        # Resolve the base to diff against: explicit input, else the PR base, else HEAD^.
        BASE="$INPUT_BASE_REF"
        if [ -z "$BASE" ]; then BASE="$PR_BASE_SHA"; fi
        if [ -z "$BASE" ]; then BASE="$(git rev-parse HEAD^ 2>/dev/null || git rev-parse HEAD)"; fi
        echo "Diffing against base: $BASE"
        # Best-effort deepen (the PR base SHA is usually absent from a default
        # depth-1 checkout). Failure here is only a warning — the authoritative,
        # fail-fast check is the rev-parse below.
        git fetch --no-tags --depth=1 origin "$BASE" \
          || echo "::warning::EvoGuard: could not fetch base '$BASE' from origin — trying to resolve it locally"
        git rev-parse --verify --quiet "${BASE}^{commit}" >/dev/null \
          || fail_setup "base_ref_unavailable" \
               "cannot resolve the diff base '$BASE' in this checkout. Use actions/checkout with 'fetch-depth: 0', or pass a 'base-ref' that is reachable from this checkout."
        set +e
        git diff "$BASE...HEAD" > "$RUNNER_TEMP/guard.diff" 2> "$RUNNER_TEMP/guard-diff.err"
        DIFF_CODE=$?
        set -e
        if [ "$DIFF_CODE" -ne 0 ]; then
          fail_setup "base_diff_failed" \
            "'git diff ${BASE}...HEAD' failed ($(head -c 300 "$RUNNER_TEMP/guard-diff.err")). A shallow checkout with no merge base is the usual cause — use actions/checkout with 'fetch-depth: 0'."
        fi
        # The recommended path: pipe the diff; EvoGuard reverse-applies it to the head
        # checkout (this working dir) — no second checkout or worktree.
        ARGS=(guard --diff - --report "$RUNNER_TEMP/guard-report.md" --json "$RUNNER_TEMP/guard.json")
        if [ -n "$INPUT_TEST_COMMAND" ]; then ARGS+=(--test-command "$INPUT_TEST_COMMAND"); fi
        if [ -n "$INPUT_PROTECTED" ]; then read -r -a PROTECTED <<< "$INPUT_PROTECTED"; ARGS+=(--protected "${PROTECTED[@]}"); fi
        if [ -n "$INPUT_ALLOW" ]; then read -r -a ALLOW <<< "$INPUT_ALLOW"; ARGS+=(--allow "${ALLOW[@]}"); fi
        if [ "$INPUT_ALLOW_NEW_TESTS" = "true" ]; then ARGS+=(--allow-new-tests); fi
        if [ -n "$INPUT_ISOLATION" ]; then ARGS+=(--isolation "$INPUT_ISOLATION"); fi
        if [ -n "$INPUT_DOCKER_IMAGE" ]; then ARGS+=(--docker-image "$INPUT_DOCKER_IMAGE"); fi
        if [ -n "$INPUT_DOCKER_NETWORK" ]; then ARGS+=(--docker-network "$INPUT_DOCKER_NETWORK"); fi
        if [ -n "$INPUT_TIMEOUT" ]; then ARGS+=(--timeout "$INPUT_TIMEOUT"); fi
        if [ -n "$INPUT_MEM_LIMIT" ]; then ARGS+=(--mem-limit "$INPUT_MEM_LIMIT"); fi
        if [ -n "$INPUT_SARIF" ]; then ARGS+=(--sarif "$INPUT_SARIF"); fi
        if [ -n "$INPUT_VERIFIER_PACK" ]; then ARGS+=(--verifier-pack "$INPUT_VERIFIER_PACK"); fi
        if [ -n "$INPUT_EXPECT_VERIFIER_PACK_SHA256" ]; then ARGS+=(--expect-verifier-pack-sha256 "$INPUT_EXPECT_VERIFIER_PACK_SHA256"); fi
        if [ "$INPUT_BLACKBOX" = "true" ]; then ARGS+=(--blackbox); fi
        if [ "$INPUT_BLACKBOX_ONLY" = "true" ]; then ARGS+=(--blackbox-only); fi
        if [ -n "$INPUT_REQUIRE_REPORT_INTEGRITY" ]; then ARGS+=(--require-report-integrity "$INPUT_REQUIRE_REPORT_INTEGRITY"); fi
        if [ -n "$INPUT_REQUIRE_CANDIDATE_ISOLATION" ]; then ARGS+=(--require-candidate-isolation "$INPUT_REQUIRE_CANDIDATE_ISOLATION"); fi
        if [ "$INPUT_TRUST_SETUP_ON_HOST" = "true" ]; then
          ARGS+=(--trust-setup-on-host)
        elif [ "$INPUT_TRUST_SETUP_ON_HOST" = "false" ]; then
          ARGS+=(--no-trust-setup-on-host)
        fi
        if [ "$INPUT_DIFF_COVERAGE" = "true" ]; then ARGS+=(--diff-coverage); fi
        if [ -n "$INPUT_MIN_DIFF_COVERAGE" ]; then ARGS+=(--min-diff-coverage "$INPUT_MIN_DIFF_COVERAGE"); fi
        if [ "$INPUT_BASELINE_EVIDENCE" = "true" ]; then ARGS+=(--baseline-evidence); fi
        if [ "$INPUT_REQUIRE_DEMONSTRATED_FIX" = "true" ]; then ARGS+=(--require-demonstrated-fix); fi
        # Exact-revision binding: a plain `git diff` carries no commit identity,
        # so the signed/attested verdict would float free of the commit being
        # merged. Resolve and pass the real commit + tree SHAs.
        BASE_COMMIT="$(git rev-parse --verify --quiet "${BASE}^{commit}" || true)"
        HEAD_COMMIT="$(git rev-parse HEAD)"
        if [ -n "$BASE_COMMIT" ]; then
          ARGS+=(--base-sha "$BASE_COMMIT" --base-tree-sha "$(git rev-parse "${BASE_COMMIT}^{tree}")")
        fi
        ARGS+=(--head-sha "$HEAD_COMMIT" --head-tree-sha "$(git rev-parse "HEAD^{tree}")")
        set +e
        evo-guard "${ARGS[@]}" < "$RUNNER_TEMP/guard.diff"
        GUARD_CODE=$?
        set -e
        # Tolerant reads: if the guard crashed before writing its JSON/report,
        # surface ERROR + the exit code rather than a bash traceback.
        VERDICT=$(python -c "import json;print(json.load(open('$RUNNER_TEMP/guard.json'))['verdict'])" 2>/dev/null || echo "ERROR")
        echo "verdict=$VERDICT" >> "$GITHUB_OUTPUT"
        # Surface the evidence (1.7): the attestation is the point of the newer
        # releases — make it reachable without custom steps.
        echo "json-path=$RUNNER_TEMP/guard.json" >> "$GITHUB_OUTPUT"
        echo "report-path=$RUNNER_TEMP/guard-report.md" >> "$GITHUB_OUTPUT"
        POLICY_SHA=$(python -c "import json;print((json.load(open('$RUNNER_TEMP/guard.json')).get('attestation') or {}).get('policy_sha256') or '')" 2>/dev/null || echo "")
        echo "policy-sha=$POLICY_SHA" >> "$GITHUB_OUTPUT"
        echo "head-sha=$HEAD_COMMIT" >> "$GITHUB_OUTPUT"
        if [ -f "$RUNNER_TEMP/guard-report.md" ]; then
          cat "$RUNNER_TEMP/guard-report.md" >> "$GITHUB_STEP_SUMMARY"
        fi
        if [ "$INPUT_FAIL_ON" = "rejected-only" ]; then
          [ "$VERDICT" = "REJECTED" ] && exit 1 || exit 0
        fi
        exit $GUARD_CODE

    - name: Comment on the PR
      if: ${{ always() && inputs.comment == 'true' && github.event_name == 'pull_request' }}
      uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
      with:
        script: |
          const fs = require('fs');
          const p = process.env.RUNNER_TEMP + '/guard-report.md';
          if (!fs.existsSync(p)) return;
          // Stable hidden marker so re-runs UPDATE one sticky comment instead of
          // appending a new one each push (see issue #16). Kept invisible (HTML
          // comment) and unchanged across runs; the report content is unchanged.
          const MARKER = '<!-- evoguard-report -->';
          const body = MARKER + '\n' + fs.readFileSync(p, 'utf8');
          const { owner, repo } = context.repo;
          const issue_number = context.issue.number;
          // Find a prior EvoGuard comment by our marker; update it if present,
          // otherwise create a fresh one.
          const comments = await github.paginate(github.rest.issues.listComments, {
            owner, repo, issue_number, per_page: 100,
          });
          const existing = comments.find((c) => c.body && c.body.includes(MARKER));
          if (existing) {
            await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body });
          } else {
            await github.rest.issues.createComment({ owner, repo, issue_number, body });
          }
