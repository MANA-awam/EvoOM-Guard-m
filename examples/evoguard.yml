# Example workflow — copy to `.github/workflows/evoguard.yml` in the repo you
# want to protect. EvoGuard verifies each PR's source changes against the repo's
# own tests and REJECTS any edit to the tests or their configuration.
name: EvoGuard

on:
  pull_request:

permissions:
  contents: read
  pull-requests: write   # required to post the verdict as a PR comment

jobs:
  guard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0            # Guard needs the base commit to diff against

      - uses: EvoRiseKsa/EvoOM-Guard-m@v3.5.2   # pin a release (@<sha> strictest, @main latest)
        with:
          test-command: "python -m pytest -q"
          comment: "true"           # same-repo PR comment; forks keep the job summary
          fail-on: "any-non-pass"   # required for pull_request security gating
