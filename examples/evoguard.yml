# Example workflow — copy to `.github/workflows/evoguard.yml` in the repo you
# want to protect. Commit a `.evoguard.json` at the repository root too, for
# example: { "test_command": ["python", "-m", "pytest", "-q"] }.
# On pull_request, EvoGuard reads that policy from the verified base SHA. Do NOT
# put test-command, verifier-pack, black-box, isolation, or other judge settings
# in `with:`: the candidate can edit this workflow, so those values are ignored.
# Protect this workflow with a required workflow/status check and review policy;
# a gate cannot run if a PR removes or replaces its own workflow.
name: EvoGuard

on:
  pull_request:

permissions:
  contents: read
  pull-requests: write   # required to post the verdict as a PR comment

jobs:
  guard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0            # Guard needs the base commit to diff against

      - uses: EvoRiseKsa/EvoOM-Guard-m@v4.2.0   # published release (@<sha> strictest, @main latest)
        with:
          comment: "true"           # same-repo PR comment; forks keep the job summary
          fail-on: "any-non-pass"   # required for pull_request security gating
