name: Windows compatibility

on:
  push:
    branches: [main]
  pull_request:

# The Windows compatibility suite only reads the source tree.
permissions:
  contents: read

jobs:
  smoke:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v6
        with:
          node-version: "22"
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"
      - name: Install pinned runner and test dependencies
        run: |
          npm install -g vitest@4.1.10
          pip install -e ".[dev]"
      - name: Full Windows unit and security suite
        run: python -m pytest tests/ -q
      - name: CLI Unicode and zipapp smoke
        env:
          PYTHONIOENCODING: cp1256
        run: python -m pytest tests/test_cli.py tests/test_zipapp.py -q
