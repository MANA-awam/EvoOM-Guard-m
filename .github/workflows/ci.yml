name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:

# CI never needs a write-capable token. Keep this explicit so adding a job
# cannot silently inherit a broader repository default.
permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install locked Python CI dependencies
        run: |
          python -m pip install --only-binary=:all: --require-hashes -r requirements/ci.lock
          # The repository itself has no runtime dependencies. Avoid a second
          # resolver pass and keep the build backend inside the hash-locked set.
          python -m pip install --no-deps --no-build-isolation -e .

      - name: Lint (ruff)
        run: python -m ruff check evoom_guard/ tests/

      - name: Type-check (mypy)
        run: python -m mypy evoom_guard/

      - name: Architecture import-boundary ratchet
        run: python -m pytest tests/architecture/test_import_boundaries.py -q

      - name: Tests + coverage
        run: |
          python -m coverage run -m pytest tests/ -q
          python -m coverage report

      - name: Import smoke (stdlib-only core, no extras)
        run: |
          python -c "import evoom_guard, evoom_guard.guard, evoom_guard.cli; print('ok', evoom_guard.__version__)"

      - name: CLI smoke — a cheat patch must be REJECTED
        run: |
          evo-guard version
          mkdir -p /tmp/demo/pkg /tmp/demo/tests
          printf 'def dbl(x):\n    return x + x + 1\n' > /tmp/demo/pkg/m.py
          printf 'from pkg.m import dbl\n\ndef test_dbl():\n    assert dbl(3) == 6\n' > /tmp/demo/tests/test_m.py
          printf '<<<FILE: tests/test_m.py>>>\ndef test_dbl():\n    assert True\n<<<END FILE>>>\n' > /tmp/cheat.txt
          if evo-guard guard /tmp/demo --patch /tmp/cheat.txt; then
            echo "cheat patch was NOT rejected" && exit 1
          else
            echo "cheat patch correctly rejected"
          fi

  e2e-runners:
    # Exercise the structured-verdict oracle END-TO-END against real runners (not
    # just the adapter wiring): vitest + node --test, producing junit+exit verdicts
    # on a real PASS/FAIL. jest stays env-gated (see tests/test_jest_oracle.py);
    # gVisor needs the runsc runtime and is validated out-of-band (docs/PROOFS.md).
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version: "22"
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"
      - name: Install locked Vitest CLI
        run: |
          npm ci --ignore-scripts --prefix tools/ci-vitest
          echo "${GITHUB_WORKSPACE}/tools/ci-vitest/node_modules/.bin" >> "$GITHUB_PATH"
      - name: Install locked Python CI dependencies
        run: |
          python -m pip install --only-binary=:all: --require-hashes -r requirements/ci.lock
          python -m pip install --no-deps --no-build-isolation -e .
      - name: e2e — vitest + node --test oracles
        run: python -m pytest tests/test_vitest_oracle.py tests/test_node_oracle.py -v

  blackbox-docker-e2e:
    # The unit tests prove the FAIL-CLOSED half of the black-box candidate
    # boundary (no daemon → no PASS). This job proves the other half on a REAL
    # daemon: a malicious probe candidate actively tries to write the host, open a
    # network socket, and locate the judge-owned pack/report — and must fail every
    # time. A breach flips the pack to FAIL and fails this job loudly. See
    # tests/test_blackbox_docker_e2e.py.
    runs-on: ubuntu-latest  # GitHub-hosted runners ship a working Docker daemon
    env:
      # Immutable OCI index for Docker Hub's python:3.12-slim. Docker selects
      # the platform manifest from this reviewed index, rather than a mutable tag.
      EVOGUARD_E2E_IMAGE: python:3.12-slim@sha256:57cd7c3a7a273101a6485ba99423ee568157882804b1124b4dd04266317710de
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"
      - name: Install locked Python CI dependencies
        run: |
          python -m pip install --only-binary=:all: --require-hashes -r requirements/ci.lock
          python -m pip install --no-deps --no-build-isolation -e .
      - name: Sanity — a real Docker daemon is present
        run: docker version
      - name: Pre-pull runtime images
        run: |
          docker pull "$EVOGUARD_E2E_IMAGE"
          # A runner-bearing image lets the composite-under-docker case run too.
          docker build --build-arg PYTHON_IMAGE="$EVOGUARD_E2E_IMAGE" \
            --tag evoguard-e2e-pytest:local \
            --file ops/ci/docker/evoguard-e2e-pytest.Dockerfile .
      - name: Docker E2E — the candidate must be confined
        env:
          EVOGUARD_E2E_PYTEST_IMAGE: evoguard-e2e-pytest:local
        run: >-
          python -m pytest tests/test_blackbox_docker_e2e.py
          tests/test_docker_isolation.py::test_docker_setup_suite_and_pack_e2e -v

  release-tag-guard:
    # Fail the build if evoom_guard.__version__ has no matching git tag on a
    # tagged commit — prevents the "documented install pins a tag that doesn't
    # exist" defect.
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"
      - name: Version matches tag
        run: |
          # This guard only reads source metadata; do not invoke a package
          # resolver or build backend merely to obtain the local version.
          V="$(PYTHONPATH="$GITHUB_WORKSPACE" python -c 'import evoom_guard; print(evoom_guard.__version__)')"
          TAG="${GITHUB_REF_NAME#v}"
          echo "package=$V tag=$TAG"
          test "$V" = "$TAG"

  publish-pyz:
    # Publishing the immutable draft creates the version tag only after the
    # assets are locked in place. Rebuild deterministically, then verify the
    # published bytes; this tag-triggered job is intentionally read-only.
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [test, release-tag-guard]
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"
      - name: Build evo-guard.pyz
        run: python -I ops/build_pyz.py -o dist/evo-guard.pyz
      - name: Smoke-test the artifact
        run: |
          test "$(python -I dist/evo-guard.pyz version)" = "evo-guard ${GITHUB_REF_NAME#v}"
          python -I dist/evo-guard.pyz doctor
      - name: Checksums (release integrity)
        run: ( cd dist && sha256sum evo-guard.pyz | tee SHA256SUMS )
      - name: Verify the published immutable release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          TAG_SHA="$(gh api "repos/$GITHUB_REPOSITORY/commits/$GITHUB_REF_NAME" --jq .sha)"
          if [ "$TAG_SHA" != "$GITHUB_SHA" ]; then
            echo "::error::release_tag_target_mismatch: $GITHUB_REF_NAME points to $TAG_SHA, expected $GITHUB_SHA"
            exit 1
          fi

          if ! RELEASE_JSON="$(gh release view "$GITHUB_REF_NAME" \
               --json assets,isDraft,isImmutable,tagName,targetCommitish)"; then
            echo "::error::release_asset_immutable: immutable release is missing for $GITHUB_REF_NAME"
            exit 1
          fi

          RELEASE_TAG="$(jq -r .tagName <<<"$RELEASE_JSON")"
          RELEASE_TARGET="$(jq -r .targetCommitish <<<"$RELEASE_JSON")"
          RELEASE_IS_DRAFT="$(jq -r .isDraft <<<"$RELEASE_JSON")"
          RELEASE_IS_IMMUTABLE="$(jq -r .isImmutable <<<"$RELEASE_JSON")"
          if [ "$RELEASE_TAG" != "$GITHUB_REF_NAME" ] || [ "$RELEASE_TARGET" != "$GITHUB_SHA" ]; then
            echo "::error::release_target_commit_mismatch: release metadata does not bind $GITHUB_REF_NAME to $GITHUB_SHA"
            exit 1
          fi
          if [ "$RELEASE_IS_DRAFT" != "false" ] || [ "$RELEASE_IS_IMMUTABLE" != "true" ]; then
            echo "::error::release_not_immutable: $GITHUB_REF_NAME must be published and immutable"
            exit 1
          fi

          EXPECTED_ASSETS="$(printf '%s\n' SHA256SUMS evo-guard.pyz | LC_ALL=C sort)"
          RELEASE_ASSETS="$(jq -r '.assets[].name' <<<"$RELEASE_JSON" | LC_ALL=C sort)"
          if [ "$RELEASE_ASSETS" != "$EXPECTED_ASSETS" ]; then
            echo "::error::release_asset_set_mismatch: published release asset set is not exact"
            printf 'expected:\n%s\nactual:\n%s\n' "$EXPECTED_ASSETS" "$RELEASE_ASSETS"
            exit 1
          fi

          mkdir -p existing-release-assets
          for asset in evo-guard.pyz SHA256SUMS; do
            if printf '%s\n' "$RELEASE_ASSETS" | grep -Fxq "$asset"; then
              gh release download "$GITHUB_REF_NAME" --pattern "$asset" \
                --dir existing-release-assets
              if ! cmp -s "dist/$asset" "existing-release-assets/$asset"; then
                echo "::error::release_asset_immutable: existing $asset differs"
                exit 1
              fi
              echo "$asset already exists with identical bytes"
            else
              echo "::error::release_asset_immutable: published release is missing $asset"
              exit 1
            fi
          done
