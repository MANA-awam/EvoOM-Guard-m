name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install (dev extras)
        run: pip install -e ".[dev]"

      - name: Lint (ruff)
        run: ruff check evoom_guard/ tests/

      - name: Type-check (mypy)
        run: mypy evoom_guard/

      - name: Tests + coverage
        run: |
          coverage run -m pytest tests/ -q
          coverage report

      - name: Import smoke (stdlib-only core, no extras)
        run: |
          python -c "import evoom_guard, evoom_guard.guard, evoom_guard.cli; print('ok', evoom_guard.__version__)"

      - name: CLI smoke — a cheat patch must be REJECTED
        run: |
          evo-guard version
          mkdir -p /tmp/demo/pkg /tmp/demo/tests
          printf 'def dbl(x):\n    return x + x + 1\n' > /tmp/demo/pkg/m.py
          printf 'from pkg.m import dbl\n\ndef test_dbl():\n    assert dbl(3) == 6\n' > /tmp/demo/tests/test_m.py
          printf '<<<FILE: tests/test_m.py>>>\ndef test_dbl():\n    assert True\n<<<END FILE>>>\n' > /tmp/cheat.txt
          if evo-guard guard /tmp/demo --patch /tmp/cheat.txt; then
            echo "cheat patch was NOT rejected" && exit 1
          else
            echo "cheat patch correctly rejected"
          fi

  e2e-runners:
    # Exercise the structured-verdict oracle END-TO-END against real runners (not
    # just the adapter wiring): vitest + node --test, producing junit+exit verdicts
    # on a real PASS/FAIL. jest stays env-gated (see tests/test_jest_oracle.py);
    # gVisor needs the runsc runtime and is validated out-of-band (docs/PROOFS.md).
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install the vitest CLI
        run: npm install -g vitest
      - name: Install (dev extras)
        run: pip install -e ".[dev]"
      - name: e2e — vitest + node --test oracles
        run: python -m pytest tests/test_vitest_oracle.py tests/test_node_oracle.py -v

  blackbox-docker-e2e:
    # The unit tests prove the FAIL-CLOSED half of the black-box candidate
    # boundary (no daemon → no PASS). This job proves the other half on a REAL
    # daemon: a malicious probe candidate actively tries to write the host, open a
    # network socket, and locate the judge-owned pack/report — and must fail every
    # time. A breach flips the pack to FAIL and fails this job loudly. See
    # tests/test_blackbox_docker_e2e.py.
    runs-on: ubuntu-latest  # GitHub-hosted runners ship a working Docker daemon
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install (dev extras)
        run: pip install -e ".[dev]"
      - name: Sanity — a real Docker daemon is present
        run: docker version
      - name: Pre-pull runtime images
        run: |
          docker pull python:3.12-slim
          # A runner-bearing image lets the composite-under-docker case run too.
          docker build -t evoguard-e2e-pytest:local - <<'DOCKER'
          FROM python:3.12-slim
          RUN pip install --no-cache-dir pytest
          DOCKER
      - name: Docker E2E — the candidate must be confined
        env:
          EVOGUARD_E2E_IMAGE: python:3.12-slim
          EVOGUARD_E2E_PYTEST_IMAGE: evoguard-e2e-pytest:local
        run: >-
          python -m pytest tests/test_blackbox_docker_e2e.py
          tests/test_docker_isolation.py::test_docker_setup_suite_and_pack_e2e -v

  release-tag-guard:
    # Fail the build if evoom_guard.__version__ has no matching git tag on a
    # tagged commit — prevents the "documented install pins a tag that doesn't
    # exist" defect.
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Version matches tag
        run: |
          pip install -e .
          V="$(python -c 'import evoom_guard; print(evoom_guard.__version__)')"
          TAG="${GITHUB_REF_NAME#v}"
          echo "package=$V tag=$TAG"
          test "$V" = "$TAG"

  publish-pyz:
    # On a version tag, build the zero-dependency single-file `evo-guard.pyz`
    # and attach it to the GitHub Release, so adopters can run the gate without
    # pip. Gated behind the version⟷tag check + tests.
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [test, release-tag-guard]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Build evo-guard.pyz
        run: python ops/build_pyz.py -o dist/evo-guard.pyz
      - name: Smoke-test the artifact
        run: |
          test "$(python dist/evo-guard.pyz version)" = "evo-guard ${GITHUB_REF_NAME#v}"
          python dist/evo-guard.pyz doctor
      - name: Checksums (release integrity)
        run: ( cd dist && sha256sum evo-guard.pyz | tee SHA256SUMS )
      - name: Attach to the release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          TAG_SHA="$(gh api "repos/$GITHUB_REPOSITORY/commits/$GITHUB_REF_NAME" --jq .sha)"
          if [ "$TAG_SHA" != "$GITHUB_SHA" ]; then
            echo "::error::release_tag_target_mismatch: $GITHUB_REF_NAME points to $TAG_SHA, expected $GITHUB_SHA"
            exit 1
          fi

          gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1 \
            || gh release create "$GITHUB_REF_NAME" \
                 --target "$GITHUB_SHA" \
                 --title "$GITHUB_REF_NAME" \
                 --notes "Automated release assets."

          mkdir -p existing-release-assets
          for asset in evo-guard.pyz SHA256SUMS; do
            if gh release view "$GITHUB_REF_NAME" --json assets \
                 --jq ".assets[] | select(.name == \"$asset\") | .name" \
                 | grep -Fxq "$asset"; then
              gh release download "$GITHUB_REF_NAME" --pattern "$asset" \
                --dir existing-release-assets
              if ! cmp -s "dist/$asset" "existing-release-assets/$asset"; then
                echo "::error::release_asset_immutable: existing $asset differs"
                exit 1
              fi
              echo "$asset already exists with identical bytes"
            else
              gh release upload "$GITHUB_REF_NAME" "dist/$asset"
            fi
          done
