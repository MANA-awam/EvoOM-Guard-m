# ─────────────────────────────────────────────────────────────────────────────
# Release: creates the vX.Y.Z tag + GitHub Release and attaches the
# zero-dependency single-file `evo-guard.pyz` (+ SHA256SUMS).
#
# Two triggers:
#   * push of a branch named `release/vX.Y.Z` (the tag is derived from the
#     branch name; the branch is deleted after a successful release), or
#   * manual workflow_dispatch with a `tag` input (Actions tab).
#
# Exists because tags created by GITHUB_TOKEN do not re-trigger the tag-push
# CI jobs (GitHub's recursion guard), and some git proxies refuse tag pushes —
# so this one workflow does the whole release end-to-end.
#
# Marketplace note (root cause, verified on the releases page): releases
# created here via `gh release create` do NOT carry the "Publish this Action
# to the GitHub Marketplace" flag — that checkbox exists ONLY in the web UI
# and has no API. Such releases lack the "Marketplace" badge on
# /releases, and the public listing can serve a stale "Latest" from cache.
# After each release, a maintainer should (one minute, web UI):
#   Releases -> the new tag -> Edit -> tick "Publish this Action to the
#   GitHub Marketplace" -> Update release,
# then confirm the "Marketplace" badge appears on the release and
# https://github.com/marketplace/actions/evoom-guard shows the new tag
# (hard-refresh — the page is CDN-cached) before announcing anywhere.
name: Release

on:
  push:
    branches: ['release/v*']
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (must equal 'v' + evoom_guard.__version__)"
        required: true
        default: "v2.0.0"

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Resolve the tag (input, or the release/* branch name)
        run: |
          TAG="${{ inputs.tag }}"
          if [ -z "$TAG" ]; then TAG="${GITHUB_REF_NAME#release/}"; fi
          echo "TAG=$TAG" >> "$GITHUB_ENV"
          echo "releasing $TAG from $GITHUB_SHA"

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"

      - name: Version matches the requested tag
        run: |
          pip install -e ".[dev]"
          V="$(python -c 'import evoom_guard; print(evoom_guard.__version__)')"
          echo "package=$V tag=$TAG"
          test "v$V" = "$TAG"

      - name: Tests must be green before a release
        run: python -m pytest tests/ -q

      - name: Build evo-guard.pyz
        run: python ops/build_pyz.py -o dist/evo-guard.pyz

      - name: Smoke-test the artifact
        run: |
          test "$(python dist/evo-guard.pyz version)" = "evo-guard ${TAG#v}"
          python dist/evo-guard.pyz doctor

      - name: Checksums (release integrity)
        run: ( cd dist && sha256sum evo-guard.pyz | tee SHA256SUMS )

      - name: Create an immutable tag + release with assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          # A rerun must never retarget an existing tag or replace its assets
          # with bytes built from another commit.
          TAG_SHA="$(gh api "repos/$GITHUB_REPOSITORY/commits/$TAG" --jq .sha 2>/dev/null || true)"
          if [ -n "$TAG_SHA" ] && [ "$TAG_SHA" != "$GITHUB_SHA" ]; then
            echo "::error::release_tag_target_mismatch: $TAG points to $TAG_SHA, expected $GITHUB_SHA"
            exit 1
          fi

          gh release view "$TAG" >/dev/null 2>&1 \
            || gh release create "$TAG" \
                 --target "$GITHUB_SHA" \
                 --title "$TAG" \
                 --generate-notes

          RESOLVED_SHA="$(gh api "repos/$GITHUB_REPOSITORY/commits/$TAG" --jq .sha)"
          test "$RESOLVED_SHA" = "$GITHUB_SHA"

          mkdir -p existing-release-assets
          for asset in evo-guard.pyz SHA256SUMS; do
            if gh release view "$TAG" --json assets \
                 --jq ".assets[] | select(.name == \"$asset\") | .name" \
                 | grep -Fxq "$asset"; then
              gh release download "$TAG" --pattern "$asset" \
                --dir existing-release-assets
              if ! cmp -s "dist/$asset" "existing-release-assets/$asset"; then
                echo "::error::release_asset_immutable: existing $asset differs"
                exit 1
              fi
              echo "$asset already exists with identical bytes"
            else
              gh release upload "$TAG" "dist/$asset"
            fi
          done

      - name: Delete the release/* trigger branch (cleanup)
        if: ${{ github.event_name == 'push' }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh api -X DELETE "repos/$GITHUB_REPOSITORY/git/refs/heads/$GITHUB_REF_NAME" || true
