# ─────────────────────────────────────────────────────────────────────────────
# Release: validates the requested version, runs the full test suite, builds the
# zero-dependency `evo-guard.pyz` (+ SHA256SUMS), and prepares a draft release.
#
# The workflow is manual-only and its jobs accept the default branch only.
# A push to an unprotected release/* branch must never receive the contents:write
# token used to create a draft release.
#
# Immutable Releases is enabled for this repository. GitHub's required order is
# draft -> upload every asset -> publish; publishing locks the tag and assets.
# This workflow therefore stops at a fully populated draft and never publishes.
#
# The Marketplace checkbox exists only in GitHub's web UI. After this workflow:
#   Releases -> draft -> Edit -> tick "Publish this Action to the GitHub
#   Marketplace" -> Publish release.
# Publication locks the associated tag and uploaded assets and generates
# GitHub's release attestation. Then confirm the Marketplace badge and
# https://github.com/marketplace/actions/evoom-guard shows the new tag
# (hard-refresh; the page is CDN-cached) before announcing the release.
name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (must equal 'v' + evoom_guard.__version__)"
        required: true

# Every permission is declared at the narrowest possible scope below. This
# prevents a future job from inheriting a repository-wide write token by
# accident; only prepare-draft needs contents:write.
permissions: {}

# Never cancel an earlier release run: cancellation after uploading one asset
# would leave an incomplete draft that a later run must audit before mutation.
concurrency:
  group: release-${{ github.repository }}
  cancel-in-progress: false

jobs:
  validate-test:
    # workflow_dispatch can be invoked with another ref; that must be a no-op.
    if: github.ref == format('refs/heads/{0}', github.event.repository.default_branch)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      tag: ${{ steps.resolve-tag.outputs.tag }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: Resolve and validate the requested tag
        id: resolve-tag
        env:
          DISPATCH_TAG: ${{ inputs.tag }}
        run: |
          set -euo pipefail
          TAG="$DISPATCH_TAG"
          if [[ ! "$TAG" =~ ^v(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)$ ]]; then
            echo "::error::invalid_release_tag: expected canonical vMAJOR.MINOR.PATCH, got '$TAG'"
            exit 2
          fi
          printf 'tag=%s\n' "$TAG" >> "$GITHUB_OUTPUT"
          printf 'TAG=%s\n' "$TAG" >> "$GITHUB_ENV"
          echo "releasing $TAG from $GITHUB_SHA"

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"

      - name: Version matches the requested tag
        run: |
          python -m pip install --only-binary=:all: --require-hashes -r requirements/ci.lock
          python -m pip install --no-deps --no-build-isolation -e .
          V="$(python -c 'import evoom_guard; print(evoom_guard.__version__)')"
          echo "package=$V tag=$TAG"
          test "v$V" = "$TAG"

      - name: Lint (Ruff)
        run: python -m ruff check evoom_guard/ tests/

      - name: Type-check (Mypy)
        run: python -m mypy evoom_guard/

      - name: Tests must be green before a release
        run: python -m pytest tests/ -q

  release-e2e:
    # Re-run the two integration boundaries for the manually selected default
    # branch; the write-capable job cannot run before these complete.
    if: github.ref == format('refs/heads/{0}', github.event.repository.default_branch)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      # Same immutable OCI index as CI's Docker proof.
      EVOGUARD_E2E_IMAGE: python:3.12-slim@sha256:57cd7c3a7a273101a6485ba99423ee568157882804b1124b4dd04266317710de
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version: "22"
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"
      - name: Install integration-test dependencies
        run: |
          npm ci --ignore-scripts --prefix tools/ci-vitest
          echo "${GITHUB_WORKSPACE}/tools/ci-vitest/node_modules/.bin" >> "$GITHUB_PATH"
          python -m pip install --only-binary=:all: --require-hashes -r requirements/ci.lock
          python -m pip install --no-deps --no-build-isolation -e .
      - name: E2E — vitest and node:test oracles
        run: python -m pytest tests/test_vitest_oracle.py tests/test_node_oracle.py -v
      - name: Sanity — a real Docker daemon is present
        run: docker version
      - name: Prepare pinned runner dependencies
        run: |
          docker pull "$EVOGUARD_E2E_IMAGE"
          docker build --build-arg PYTHON_IMAGE="$EVOGUARD_E2E_IMAGE" \
            --tag evoguard-e2e-pytest:local \
            --file ops/ci/docker/evoguard-e2e-pytest.Dockerfile .
      - name: Docker E2E — the candidate must be confined
        env:
          EVOGUARD_E2E_PYTEST_IMAGE: evoguard-e2e-pytest:local
        run: >-
          python -m pytest tests/test_blackbox_docker_e2e.py
          tests/test_docker_isolation.py::test_docker_setup_suite_and_pack_e2e -v

  release-windows-e2e:
    if: github.ref == format('refs/heads/{0}', github.event.repository.default_branch)
    runs-on: windows-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version: "22"
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"
      - name: Install pinned runner and test dependencies
        run: |
          npm ci --ignore-scripts --prefix tools/ci-vitest
          Add-Content -Path $env:GITHUB_PATH -Value "$env:GITHUB_WORKSPACE\tools\ci-vitest\node_modules\.bin"
          python -m pip install --only-binary=:all: --require-hashes -r requirements/ci.lock
          python -m pip install --no-deps --no-build-isolation -e .
      - name: Windows E2E — native runner and baseline command resolution
        run: python -m pytest tests/test_vitest_oracle.py tests/test_node_oracle.py -v

  build-artifact:
    needs: [validate-test, release-e2e, release-windows-e2e]
    if: github.ref == format('refs/heads/{0}', github.event.repository.default_branch)
    runs-on: ubuntu-latest
    permissions:
      # GitHub Artifact Attestations are generated for the exact bytes built
      # below. This job never receives repository or release write access.
      attestations: write
      contents: read
      id-token: write
    env:
      TAG: ${{ needs.validate-test.outputs.tag }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"

      - name: Build evo-guard.pyz in a clean dependency-free job
        run: python -I ops/build_pyz.py -o dist/evo-guard.pyz

      - name: Smoke-test the artifact
        run: |
          test "$(python -I dist/evo-guard.pyz version)" = "evo-guard ${TAG#v}"
          python -I dist/evo-guard.pyz doctor

      - name: Checksums (release integrity)
        run: ( cd dist && sha256sum evo-guard.pyz | tee SHA256SUMS )

      # This is build provenance for the exact local file, not a release
      # attestation and not an EvoGuard verdict. It is generated before the
      # file crosses the job boundary into the release-writing job.
      - name: Generate GitHub build provenance for the exact artifact
        uses: actions/attest@f7c74d28b9d84cb8768d0b8ca14a4bac6ef463e6 # v4
        with:
          subject-path: dist/evo-guard.pyz

      - name: Transfer the verified release assets
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: release-assets
          path: |
            dist/evo-guard.pyz
            dist/SHA256SUMS
          if-no-files-found: error
          overwrite: true
          retention-days: 1

  prepare-draft:
    needs: [validate-test, build-artifact]
    if: github.ref == format('refs/heads/{0}', github.event.repository.default_branch)
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      GH_REPO: ${{ github.repository }}
      TAG: ${{ needs.validate-test.outputs.tag }}
    steps:
      - name: Receive the verified release assets
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: release-assets
          path: dist

      - name: Verify the transferred asset set and checksum
        run: |
          set -euo pipefail
          EXPECTED_ASSETS="$(printf '%s\n' SHA256SUMS evo-guard.pyz | LC_ALL=C sort)"
          ACTUAL_ASSETS="$(find dist -maxdepth 1 -type f -printf '%f\n' | LC_ALL=C sort)"
          if [ "$ACTUAL_ASSETS" != "$EXPECTED_ASSETS" ]; then
            echo "::error::release_asset_set_mismatch: transferred asset set is not exact"
            printf 'expected:\n%s\nactual:\n%s\n' "$EXPECTED_ASSETS" "$ACTUAL_ASSETS"
            exit 1
          fi
          if [ "$(wc -l < dist/SHA256SUMS)" -ne 1 ] || \
             ! grep -Eq '^[0-9a-f]{64}  evo-guard\.pyz$' dist/SHA256SUMS; then
            echo "::error::release_checksum_format_invalid: SHA256SUMS must contain exactly the evo-guard.pyz digest"
            exit 1
          fi
          ( cd dist && sha256sum -c SHA256SUMS )

      - name: Prepare the draft release and immutable asset set
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          # A rerun must never retarget an existing tag/release or replace an
          # existing asset with bytes built from another commit.
          TAG_SHA=""
          set +e
          TAG_REF_RESPONSE="$(gh api --include \
            "repos/$GITHUB_REPOSITORY/git/ref/tags/$TAG" 2>&1)"
          TAG_REF_STATUS=$?
          set -e
          if [ "$TAG_REF_STATUS" -eq 0 ]; then
            TAG_SHA="$(gh api "repos/$GITHUB_REPOSITORY/commits/$TAG" --jq .sha)"
          elif ! grep -Eq '^HTTP/[^ ]+ 404 ' <<<"$TAG_REF_RESPONSE"; then
            echo "::error::release_tag_lookup_failed: could not determine whether $TAG already exists"
            printf '%s\n' "$TAG_REF_RESPONSE" >&2
            exit "$TAG_REF_STATUS"
          fi
          if [ -n "$TAG_SHA" ] && [ "$TAG_SHA" != "$GITHUB_SHA" ]; then
            echo "::error::release_tag_target_mismatch: $TAG points to $TAG_SHA, expected $GITHUB_SHA"
            exit 1
          fi

          if ! gh release view "$TAG" >/dev/null 2>&1; then
            gh release create "$TAG" \
              --draft \
              --target "$GITHUB_SHA" \
              --title "$TAG" \
              --generate-notes
          fi

          RELEASE_JSON="$(gh release view "$TAG" \
            --json assets,isDraft,isImmutable,tagName,targetCommitish)"
          RELEASE_TAG="$(jq -r .tagName <<<"$RELEASE_JSON")"
          RELEASE_TARGET="$(jq -r .targetCommitish <<<"$RELEASE_JSON")"
          RELEASE_IS_DRAFT="$(jq -r .isDraft <<<"$RELEASE_JSON")"
          RELEASE_IS_IMMUTABLE="$(jq -r .isImmutable <<<"$RELEASE_JSON")"
          test "$RELEASE_TAG" = "$TAG"
          if [ "$RELEASE_TARGET" != "$GITHUB_SHA" ]; then
            echo "::error::release_target_commit_mismatch: $TAG targets $RELEASE_TARGET, expected $GITHUB_SHA"
            exit 1
          fi
          if [ "$RELEASE_IS_DRAFT" != "true" ] && [ "$RELEASE_IS_IMMUTABLE" != "true" ]; then
            echo "::error::release_not_immutable: published $TAG is not immutable"
            exit 1
          fi

          EXPECTED_ASSETS="$(printf '%s\n' SHA256SUMS evo-guard.pyz | LC_ALL=C sort)"
          RELEASE_ASSETS="$(jq -r '.assets[].name' <<<"$RELEASE_JSON" | LC_ALL=C sort)"
          UNEXPECTED_ASSETS="$(printf '%s\n' "$RELEASE_ASSETS" | awk 'NF && $0 != "SHA256SUMS" && $0 != "evo-guard.pyz"')"
          if [ -n "$UNEXPECTED_ASSETS" ]; then
            echo "::error::release_asset_set_mismatch: unexpected existing assets"
            printf '%s\n' "$UNEXPECTED_ASSETS"
            exit 1
          fi

          mkdir -p existing-release-assets
          for asset in evo-guard.pyz SHA256SUMS; do
            if printf '%s\n' "$RELEASE_ASSETS" | grep -Fxq "$asset"; then
              gh release download "$TAG" --pattern "$asset" \
                --dir existing-release-assets
              if ! cmp -s "dist/$asset" "existing-release-assets/$asset"; then
                echo "::error::release_asset_immutable: existing $asset differs"
                exit 1
              fi
              echo "$asset already exists with identical bytes"
            else
              if [ "$RELEASE_IS_DRAFT" != "true" ]; then
                echo "::error::release_asset_immutable: published release is missing $asset"
                exit 1
              fi
              gh release upload "$TAG" "dist/$asset"
            fi
          done

          FINAL_ASSETS="$(gh release view "$TAG" --json assets \
            --jq '.assets[].name' | LC_ALL=C sort)"
          if [ "$FINAL_ASSETS" != "$EXPECTED_ASSETS" ]; then
            echo "::error::release_asset_set_mismatch: final release asset set is not exact"
            printf 'expected:\n%s\nactual:\n%s\n' "$EXPECTED_ASSETS" "$FINAL_ASSETS"
            exit 1
          fi

          if [ "$RELEASE_IS_DRAFT" = "true" ]; then
            echo "Draft $TAG is ready with the exact verified asset set. Select the Marketplace checkbox and publish it in GitHub's web UI."
          else
            echo "Published immutable $TAG and its exact assets match this commit; no mutation attempted."
          fi
